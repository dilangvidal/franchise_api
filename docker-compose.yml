services:

  mongodb:
    image: mongo:8.0
    container_name: franchise-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: franchise_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - franchise-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  franchise-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: franchise-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: franchise-api
      SPRING_MONGODB_HOST: mongodb
      SPRING_MONGODB_PORT: 27017
      SPRING_MONGODB_DATABASE: franchise_db
      SPRING_DATA_MONGODB_AUTO_INDEX_CREATION: true
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - franchise-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1",
              "--spider", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongodb_data:
    driver: local

networks:
  franchise-network:
    driver: bridge